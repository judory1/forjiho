<html>
<head>
    <title>합격 결과</title>
</head>

<body style="
    margin:0;
    overflow:hidden;
    background: linear-gradient(to bottom, #fff0f6, #ffd6e7);
    text-align:center;
    font-family: Arial, sans-serif;
    color:#4b2e2e;
">

    <div style="position:relative; z-index:2; padding-top:120px;">
        <h1 style="color:#ff4d6d; font-size:50px;">🎉 축하합니다! 🎉</h1>
        <h2 style="color:#d63384;">현명한 선택입니다</h2>

        <p style="font-size:24px; line-height:1.8;">
            앞으로 잘 부탁드립니다.<br>
            좋은 추억 많이 만들 자신 있습니다 ♥
        </p>

        <br>

        <a href="index.html">
            <button style="
                font-size:20px;
                padding:12px 24px;
                background-color:#ff4d6d;
                color:white;
                border:none;
                border-radius:10px;
                cursor:pointer;
            ">
                다시 보기
            </button>
        </a>
    </div>

    <script>
        function createHeart() {
            var heart = document.createElement("div");
            heart.innerHTML = "♥";
            heart.style.position = "fixed";
            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.top = window.innerHeight + "px";
            heart.style.fontSize = (20 + Math.random() * 30) + "px";
            heart.style.color = "rgb(255, " + Math.floor(50 + Math.random() * 100) + ", " + Math.floor(100 + Math.random() * 120) + ")";
            heart.style.opacity = 0.8;
            heart.style.zIndex = 1;
            heart.style.pointerEvents = "none";
            document.body.appendChild(heart);

            var move = setInterval(function() {
                var top = parseFloat(heart.style.top);
                if (top < -50) {
                    clearInterval(move);
                    heart.remove();
                } else {
                    heart.style.top = (top - 2) + "px";
                    heart.style.left = (parseFloat(heart.style.left) + (Math.random() * 4 - 2)) + "px";
                }
            }, 20);
        }

        setInterval(createHeart, 250);
    </script>

</body>
</html>
