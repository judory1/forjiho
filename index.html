<html>
<head>
    <title>Love Application</title>
</head>

<body style="
    background-image: url('jiho.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color:#4b2e2e;
    text-align:center;
    margin:0;
    padding:30px;
    font-family: Arial, sans-serif;
">

    <div style="
        background-color: rgba(255, 240, 246, 0.9);
        width:80%;
        margin:auto;
        padding:30px;
        border-radius:20px;
        position:relative;
        min-height:700px;
    ">

        <h1 style="color:#ff4d6d;">♥ 임지호 연애 지원서 ♥</h1>
        <p><b>중요 공지:</b> 아래 내용을 끝까지 읽어주세요.</p>

        <hr width="80%" size="5" noshade>

        <h2 style="color:#d63384;">지원자 정보</h2>
        <p>
            이름: 주수빈<br>
            지원 분야: 임지호 옆자리<br>
            지원 동기: 많이 좋아해서
        </p>

        <hr width="60%" size="3">

        <h2 style="color:#d63384;">지원자의 장점</h2>
        <ul style="display:inline-block; text-align:left;">
            <li>진심 100%</li>
            <li>연락 성실함</li>
            <li>웃기려고 노력함</li>
            <li>생각보다 꽤 괜찮음</li>
        </ul>

        <hr width="60%" size="3">

        <h2 style="color:#d63384;">최종 질문</h2>
        <p style="font-size:20px;">
            임지호님, 저를 만나보실 생각이 있으십니까?
        </p>

        <p style="color:red; font-size:18px;">
            ※ 권장 선택: 합격
        </p>

        <hr width="50%" size="2">

        <a href="yes.html">
            <button style="
                font-size:28px;
                padding:18px 35px;
                background-color:#ff4d6d;
                color:white;
                border:3px solid white;
                border-radius:12px;
                cursor:pointer;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            ">
                ♥ 합격 ♥
            </button>
        </a>

        <button id="noBtn" style="
            font-size:12px;
            padding:6px 10px;
            background-color:gray;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            position:absolute;
            left:65%;
            top:78%;
        ">
            불합격
        </button>

        <hr width="80%" size="5" style="margin-top:120px;">

        <p style="background-color:#ffd6e7; display:inline-block; padding:10px;">
            Made with sincerity, courage, and a little bit of desperation
        </p>
    </div>

    <script>
        var noBtn = document.getElementById("noBtn");

        noBtn.addEventListener("mouseover", function() {
            var boxWidth = window.innerWidth - 120;
            var boxHeight = window.innerHeight - 80;

            var randomX = Math.random() * boxWidth;
            var randomY = Math.random() * boxHeight;

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
            noBtn.style.position = "fixed";
        });

        noBtn.addEventListener("click", function() {
            window.location.href = "no.html";
        });
    </script>

</body>
</html>
